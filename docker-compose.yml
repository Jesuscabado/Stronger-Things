services:

  app:
    container_name: ${APP_HOST}
    build: .
    restart: unless-stopped
    command: npm start
    ports:
      - ${APP_PORT}:3000
    environment:
      APP_PORT: 3000
      MONGO_HOST: ${MONGO_CONTAINER_NAME}    # 👈 aquí
      MONGO_PORT: ${MONGO_INTERNAL_PORT}     # 👈 aquí
      USE_DRIVE_STORAGE: "true"        # 👈 añade esto
      GOOGLE_DRIVE_FOLDER_ID: "176ccWPfs5cWqqbypskPnoaTcpNPIogNO"
      GOOGLE_CREDENTIALS_PATH: "/app/google-credentials.json"
      DRIVE_SHARE_PUBLIC: "true"
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    depends_on:
      - mongo
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  mongo:
    image: mongo
    container_name: ${MONGO_CONTAINER_NAME}  # 👈 nombre real del contenedor
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - ${MONGO_PORT}:${MONGO_INTERNAL_PORT}  # 27027:27017
    volumes:
      - mongo_data:/data/db

volumes:
  node_modules:
  mongo_data: