<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo pergamino -->
  <rect width="512" height="512" rx="80" fill="#3d1c02"/>
  <!-- Borde dorado exterior -->
  <rect x="16" y="16" width="480" height="480" rx="68" fill="none" stroke="#c8a951" stroke-width="12"/>
  <!-- Borde dorado interior -->
  <rect x="32" y="32" width="448" height="448" rx="56" fill="none" stroke="#c8a951" stroke-width="4" opacity="0.6"/>
  <!-- Espada vertical -->
  <g transform="translate(256,256)">
    <!-- Hoja -->
    <polygon points="0,-160 16,-40 0,20 -16,-40" fill="#c8a951"/>
    <!-- Filo -->
    <line x1="0" y1="-160" x2="0" y2="20" stroke="#f0d070" stroke-width="2" opacity="0.6"/>
    <!-- Guarda (crossguard) -->
    <rect x="-52" y="-44" width="104" height="14" rx="7" fill="#c8a951"/>
    <!-- Puntos de las puntas de la guarda -->
    <ellipse cx="-52" cy="-37" rx="8" ry="8" fill="#a07830"/>
    <ellipse cx="52" cy="-37" rx="8" ry="8" fill="#a07830"/>
    <!-- Empuñadura -->
    <rect x="-10" y="-30" width="20" height="60" rx="5" fill="#7a3f10"/>
    <rect x="-10" y="-30" width="20" height="60" rx="5" fill="none" stroke="#c8a951" stroke-width="1.5" opacity="0.5"/>
    <!-- Pommel -->
    <ellipse cx="0" cy="40" rx="18" ry="14" fill="#c8a951"/>
    <ellipse cx="0" cy="40" rx="10" ry="7" fill="#a07830"/>
    <!-- Gema en el pommel -->
    <ellipse cx="0" cy="40" rx="5" ry="4" fill="#8b0000"/>
  </g>
  <!-- Estrellas decorativas (d20 dots) -->
  <circle cx="96" cy="96" r="6" fill="#c8a951" opacity="0.7"/>
  <circle cx="416" cy="96" r="6" fill="#c8a951" opacity="0.7"/>
  <circle cx="96" cy="416" r="6" fill="#c8a951" opacity="0.7"/>
  <circle cx="416" cy="416" r="6" fill="#c8a951" opacity="0.7"/>
</svg>
